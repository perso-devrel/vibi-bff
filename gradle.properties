ktor_version=3.1.3
kotlin_version=2.0.21
logback_version=1.5.16
kotlin.code.style=official

# 빌드 가속 — 첫 빌드 후 incremental 로 진입. daemon 이 메모리에 컴파일러 keep 해서
# 두번째 빌드부터 startup 비용이 거의 0.
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.daemon=true

# Kotlin 컴파일러 daemon 재사용 — JVM 재시작 비용 제거.
kotlin.incremental=true
kotlin.compiler.execution.strategy=daemon
