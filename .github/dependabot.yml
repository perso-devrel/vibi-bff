# Dependabot — 의존성 취약점/업데이트 자동 감시. GitHub 네이티브라 무료 + NVD API 키 불필요.
# 보안 권고: GitHub repo Settings → Code security → Dependabot alerts/security updates 도 켜두면
# 이 파일 없이도 취약점 PR 이 뜨지만, 본 파일은 정기 version-update + Actions 핀까지 함께 관리.
version: 2
updates:
  # Gradle 런타임/테스트 의존성 (build.gradle.kts + gradle.properties 의 *_version 프로퍼티).
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # PR 노이즈 최소화 — major 포함 모든 gradle 업데이트를 단일 PR 로 묶는다.
    # (update-types 미지정 = major/minor/patch 전부 그룹 포함. patterns "*" = 모든 의존성.)
    # 트레이드오프: 깨지는 major 하나가 그룹 PR 전체를 막을 수 있다 → 그땐 해당 dep 만
    # exclude-patterns 로 그룹에서 빼 개별 처리.
    groups:
      gradle:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  # deploy.yml 등의 GitHub Actions 핀 — 공급망 보안(액션 변조) + deprecation 추적.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # 액션 업데이트도 단일 PR 로 묶는다.
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"
