name: CI

# PR 게이트 — main/develop 로 가는 PR 마다 컴파일 + 테스트를 돌려 빨간 변경이 머지되는 걸 막는다.
# pull_request 이벤트의 워크플로 정의는 base 브랜치 것을 쓰므로, 이 파일이 main 에 올라가야
# main 으로 가는 모든 PR 에 체크가 붙는다.
on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# 같은 PR 에 연속 푸시되면 직전 실행 취소 (러너 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 서드파티 액션은 가변 메이저 태그(@v6)가 아니라 commit SHA 로 핀 — 태그 재지정/계정 탈취
      # 공급망 공격 차단. 갱신은 Renovate/Dependabot 가 SHA 를 bump (주석의 버전 라벨 유지).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      # ffmpeg/ffprobe 는 RenderService 실 스폰 테스트엔 필요하나 단위 테스트는 testApplication+MockK 라
      # 불필요. 빌드 깨짐/회귀만 잡으면 되므로 compileKotlin + test 만 돌린다.
      - name: Compile & test
        run: ./gradlew compileKotlin compileTestKotlin test --no-daemon --stacktrace
