name: Deploy to Cloud Run

# main 푸시 시 자동 배포 + 수동 트리거 (Actions UI 의 Run workflow 버튼).
# 최초 1회 부트스트랩 (SA 생성, API 활성화, Secret Manager 시드) 은 deploy/cloud-run.sh 로 끝내두고,
# 이 워크플로우는 매 배포마다 런타임 SA / env / secret / 리소스 스펙을 declarative 하게 wire 한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVICE_NAME: vibi-bff
  REGION: us-central1
  GEMINI_PROJECT_ID: est-perso-vt-prod
  GEMINI_LOCATION: us-central1
  PERSO_BASE_URL: https://api.perso.ai
  PERSO_STORAGE_BASE_URL: https://portal-media.perso.ai
  STORAGE_PATH: /tmp/storage

# Cloud Run 동시 배포 충돌 방지 — main 에 빠르게 연속 푸시되면 마지막 것만 살린다.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # WIF OIDC 토큰 발급에 필수

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --source . \
            --region "$REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --service-account "${{ secrets.GCP_RUNTIME_SA_EMAIL }}" \
            --execution-environment gen2 \
            --cpu 1 --memory 2Gi --cpu-boost \
            --timeout 3600 \
            --concurrency 4 \
            --min-instances 0 --max-instances 2 \
            --session-affinity \
            --allow-unauthenticated \
            --set-env-vars "^@^GEMINI_PROJECT_ID=${GEMINI_PROJECT_ID}@GEMINI_LOCATION=${GEMINI_LOCATION}@PERSO_BASE_URL=${PERSO_BASE_URL}@PERSO_STORAGE_BASE_URL=${PERSO_STORAGE_BASE_URL}@STORAGE_PATH=${STORAGE_PATH}@GOOGLE_OAUTH_CLIENT_IDS=${{ secrets.GOOGLE_OAUTH_CLIENT_IDS }}@APPLE_OAUTH_CLIENT_IDS=${{ secrets.APPLE_OAUTH_CLIENT_IDS }}@CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}@R2_BUCKET=${{ vars.R2_BUCKET }}@R2_ACCOUNT_ID=${{ vars.R2_ACCOUNT_ID }}" \
            --set-secrets "PERSO_API_KEY=PERSO_API_KEY:latest,PERSO_SPACE_SEQ=PERSO_SPACE_SEQ:latest,AUTH_JWT_SECRET=AUTH_JWT_SECRET:latest,SEPARATION_SIGNING_SECRET=SEPARATION_SIGNING_SECRET:latest,DATABASE_URL=DATABASE_URL:latest,DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest,R2_ACCESS_KEY_ID=R2_ACCESS_KEY_ID:latest,R2_SECRET_ACCESS_KEY=R2_SECRET_ACCESS_KEY:latest" \
            --quiet

      # BFF_BASE_URL 출처:
      #   1. vars.BFF_BASE_URL 가 있으면 그 값 (커스텀 도메인 운영 시 — 예: https://api.vibi.fm)
      #   2. 없으면 Cloud Run 자동 발급 URL self-reference (커스텀 도메인 미설정 fallback)
      # 매 deploy 마다 vars 가 단일 소스 — 사용자는 한 곳만 갱신.
      - name: Wire BFF_BASE_URL
        run: |
          VAR_URL="${{ vars.BFF_BASE_URL }}"
          if [ -n "$VAR_URL" ]; then
            URL="$VAR_URL"
            echo "Using vars.BFF_BASE_URL: $URL"
          else
            URL=$(gcloud run services describe "$SERVICE_NAME" \
              --region "$REGION" \
              --project "${{ secrets.GCP_PROJECT_ID }}" \
              --format='value(status.url)')
            echo "Falling back to Cloud Run default URL: $URL"
          fi
          gcloud run services update "$SERVICE_NAME" \
            --region "$REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --update-env-vars "^@^BFF_BASE_URL=$URL" \
            --quiet
          echo "::notice title=Deployed::$URL"
