name: Deploy to Cloud Run

# main 푸시 시 자동 배포 + 수동 트리거 (Actions UI 의 Run workflow 버튼).
# 최초 1회 부트스트랩 (SA 생성, API 활성화, Secret Manager 시드) 은 deploy/cloud-run.sh 로 끝내두고,
# 이 워크플로우는 매 배포마다 런타임 SA / env / secret / 리소스 스펙을 declarative 하게 wire 한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVICE_NAME: vibi-bff
  REGION: us-central1
  GEMINI_PROJECT_ID: est-perso-vt-prod
  GEMINI_LOCATION: us-central1
  PERSO_BASE_URL: https://api.perso.ai
  PERSO_STORAGE_BASE_URL: https://portal-media.perso.ai
  STORAGE_PATH: /tmp/storage

# Cloud Run 동시 배포 충돌 방지 — main 에 빠르게 연속 푸시되면 마지막 것만 살린다.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # WIF OIDC 토큰 발급에 필수

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --source . \
            --region "$REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --service-account "${{ secrets.GCP_RUNTIME_SA_EMAIL }}" \
            --execution-environment gen2 \
            --cpu 1 --memory 2Gi --cpu-boost \
            --timeout 3600 \
            --concurrency 4 \
            --min-instances 0 --max-instances 2 \
            --session-affinity \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_PROJECT_ID=${GEMINI_PROJECT_ID},GEMINI_LOCATION=${GEMINI_LOCATION},PERSO_BASE_URL=${PERSO_BASE_URL},PERSO_STORAGE_BASE_URL=${PERSO_STORAGE_BASE_URL},STORAGE_PATH=${STORAGE_PATH},GOOGLE_OAUTH_CLIENT_IDS=${{ secrets.GOOGLE_OAUTH_CLIENT_IDS }},CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}" \
            --set-secrets "PERSO_API_KEY=PERSO_API_KEY:latest,PERSO_SPACE_SEQ=PERSO_SPACE_SEQ:latest,AUTH_JWT_SECRET=AUTH_JWT_SECRET:latest,SEPARATION_SIGNING_SECRET=SEPARATION_SIGNING_SECRET:latest" \
            --quiet

      - name: Self-reference BFF_BASE_URL
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region "$REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(status.url)')
          gcloud run services update "$SERVICE_NAME" \
            --region "$REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --update-env-vars "BFF_BASE_URL=$URL" \
            --quiet
          echo "Deployed: $URL"
          echo "::notice title=Deployed::$URL"
