name: Deploy to Oracle VM

# main 푸시 시 자동 배포 + 수동 트리거 (Actions UI 의 Run workflow 버튼).
# Cloud Run → Oracle Ampere(ARM) VM 이전 후의 배포 경로 — gcloud / WIF / Secret Manager 없음.
#
# 빌드도 시크릿 wiring 도 전부 VM 안에서 닫힌다:
#   - 빌드:   docker compose 가 ARM 네이티브로 직접 빌드 (cross-arch 헤더에이크 없음)
#   - 시크릿: VM 의 deploy/oracle/bff.env (gitignored, 1회 수기 세팅)
# 따라서 이 워크플로는 "VM 에 SSH → git 최신화 → docker compose 재빌드" 트리거만 한다.
#
# 최초 1회 VM 부트스트랩(인스턴스 생성·방화벽·git clone·bff.env)은 deploy/oracle/README.md 참고.
on:
  push:
    branches: [main]
  workflow_dispatch:

# 연속 푸시 시 마지막 것만 살린다 — VM 재빌드가 겹쳐 도는 것 방지.
concurrency:
  group: deploy-oracle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 러너는 checkout 조차 불필요 — 빌드는 VM(ARM 네이티브)에서 일어나므로
      # SSH 로 명령만 던지고 빠진다.
      - name: Deploy over SSH (git pull + docker compose rebuild)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_SSH_HOST }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_SSH_PORT || 22 }}
          # ARM 네이티브 풀 재빌드가 ~5분 — 여유 있게.
          command_timeout: 30m
          # ORACLE_APP_DIR 미설정 시 기본 ~/vibi-bff. 다른 경로면 repo Variables 로 주입.
          envs: ORACLE_APP_DIR
          script: |
            set -euo pipefail
            APP_DIR="${ORACLE_APP_DIR:-$HOME/vibi-bff}"
            cd "$APP_DIR"

            echo "▶ git 최신화 (origin/main 강제 동기화)…"
            # reset --hard 로 로컬 표류 무시 — bff.env 는 gitignored 라 안 날아간다.
            git fetch origin main
            git reset --hard origin/main

            echo "▶ docker compose 재빌드 + 무중단 갱신…"
            cd deploy/oracle
            docker compose up -d --build

            echo "▶ 미사용 이미지 정리 (VM 디스크 보호)…"
            docker image prune -f

            echo "▶ 컨테이너 상태:"
            docker compose ps
        env:
          ORACLE_APP_DIR: ${{ vars.ORACLE_APP_DIR }}
