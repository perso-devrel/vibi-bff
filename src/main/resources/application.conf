ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.vibi.bff.ApplicationKt.module ]
    }
}

vibi {
    storage {
        basePath = "./storage"
        basePath = ${?STORAGE_PATH}
        # Cloudflare R2 — 설정 시 큰 산출물 다운로드를 SigV4 presigned URL redirect 로 우회.
        # R2 egress 무료라 Cloud Run egress 비용 0. blank 이면 respondFile fallback (dev 호환).
        r2Bucket = ""
        r2Bucket = ${?R2_BUCKET}
        # account ID (Cloudflare dashboard URL 의 32자 hex) — endpoint host 결정용.
        r2AccountId = ""
        r2AccountId = ${?R2_ACCOUNT_ID}
        # R2 API token. Cloudflare dashboard → R2 → Manage API Tokens. permission: Object Read & Write.
        r2AccessKeyId = ""
        r2AccessKeyId = ${?R2_ACCESS_KEY_ID}
        r2SecretAccessKey = ""
        r2SecretAccessKey = ${?R2_SECRET_ACCESS_KEY}
        # presigned URL TTL — 클라가 받자마자 다운로드 가정해 짧게. 60..86400.
        signedUrlTtlSec = "900"
        signedUrlTtlSec = ${?SIGNED_URL_TTL_SEC}
    }
    baseUrl = "http://localhost:8080"
    baseUrl = ${?BFF_BASE_URL}
    perso {
        apiKey = ""
        apiKey = ${?PERSO_API_KEY}
        baseUrl = "https://api.perso.ai"
        baseUrl = ${?PERSO_BASE_URL}
        # `/perso-storage/...` path 응답 다운로드용 (Azure Blob 기반 public CDN, 인증 X)
        storageBaseUrl = "https://portal-media.perso.ai"
        storageBaseUrl = ${?PERSO_STORAGE_BASE_URL}
        spaceSeq = "0"
        spaceSeq = ${?PERSO_SPACE_SEQ}
        pollIntervalMs = "15000"
        pollIntervalMs = ${?PERSO_POLL_INTERVAL_MS}
        maxPollMinutes = "30"
        maxPollMinutes = ${?PERSO_MAX_POLL_MINUTES}
        # SSRF 방지 화이트리스트 (콤마 분리). baseUrl/storageBaseUrl host 는 자동 포함.
        downloadAllowedHosts = "portal-media.perso.ai"
        downloadAllowedHosts = ${?PERSO_DOWNLOAD_ALLOWED_HOSTS}
    }
    separation {
        # 모바일 "이어서 작업" 윈도우 — urlTtlSec 는 abandonTtlMs 를 초과하면 안 됨 (디스크/메모리에서 reap 된 잡의
        # 토큰이 살아있어도 서버가 매핑 못함). 둘 다 7일로 맞춤.
        abandonTtlMs = "604800000"
        abandonTtlMs = ${?SEPARATION_ABANDON_TTL_MS}
        signingSecret = ""
        signingSecret = ${?SEPARATION_SIGNING_SECRET}
        urlTtlSec = "604800"
        urlTtlSec = ${?SEPARATION_URL_TTL_SEC}
        # Perso audio-separation 동시 in-flight cap. SeparationDispatcher 가 BFF-side 큐를
        # 만들어 본 값 이상 Perso 동시 호출 안 함. Perso 측 한계 (실행 1 + 큐 2-3) 안에서
        # 운영. 기본 2 = "1 실행 + 1 Perso 큐 대기" 로 idle gap 0.
        maxPersoInFlight = "2"
        maxPersoInFlight = ${?SEPARATION_MAX_PERSO_IN_FLIGHT}
        # SUBMITTING stuck 판정 임계 (초). SUBMITTING 구간은 100MB 블롭 업로드 + 재시도까지
        # 포함하므로 짧으면 업로드 도중 reaper 가 멀쩡한 잡을 죽은 줄 알고 재큐잉 → 동시 2회
        # 실행 사고. 기본 300초 (5분) = 최대 업로드 worst-case 도 넉넉히 커버, staleQueued(30분)
        # 보다 충분히 짧아 진짜 죽은 인스턴스 회수도 유지.
        stuckSubmittingSec = "300"
        stuckSubmittingSec = ${?SEPARATION_STUCK_SUBMITTING_SEC}
    }
    auth {
        # Comma-separated Google OAuth client IDs (iOS / Android / Web). tokeninfo
        # 응답의 aud 가 이 중 하나와 일치해야 통과.
        googleClientIds = ""
        googleClientIds = ${?GOOGLE_OAUTH_CLIENT_IDS}
        # Comma-separated Apple Sign In client IDs (iOS bundle id 등). JWKS 검증된
        # ID Token 의 aud 가 이 중 하나와 일치해야 통과. blank 면 Apple 로그인 비활성.
        appleClientIds = ""
        appleClientIds = ${?APPLE_OAUTH_CLIENT_IDS}
        # HMAC-SHA256 서명 키, 32+ chars. openssl rand -hex 32
        jwtSecret = ""
        jwtSecret = ${?AUTH_JWT_SECRET}
        # access token 만료(초). 기본 7일.
        jwtExpirySeconds = "604800"
        jwtExpirySeconds = ${?AUTH_JWT_EXPIRY_SECONDS}
        # UXP 패널 device-flow 의 server-side Google OAuth (web 클라이언트: client secret +
        # redirect URI 보유). 둘 다 set 일 때만 device Google 로그인 활성. redirect URI =
        # <BFF_BASE_URL>/api/v2/auth/google/callback 를 Google Console 에 등록해야 한다.
        # client id 는 자동으로 googleClientIds 검증 목록에 병합된다(AppConfig.loadConfig).
        googleOauthClientId = ""
        googleOauthClientId = ${?GOOGLE_OAUTH_CLIENT_ID}
        googleOauthClientSecret = ""
        googleOauthClientSecret = ${?GOOGLE_OAUTH_CLIENT_SECRET}
    }
    db {
        # Postgres JDBC URL. Neon free tier 권장 (jdbc:postgresql://...neon.tech/neondb?sslmode=require).
        # Cloud Run / Cloudflare Containers 어디서든 동일하게 사용.
        jdbcUrl = ""
        jdbcUrl = ${?DATABASE_URL}
        user = ""
        user = ${?DB_USER}
        password = ""
        password = ${?DB_PASSWORD}
        # HikariCP pool size. Neon free tier 100 connection 한도, 인스턴스당 5 충분.
        maxPoolSize = "5"
        maxPoolSize = ${?DB_MAX_POOL}
    }
    admin {
        # 운영자 admin SPA 의 추측 불가 경로 — `/${slug}/` 로 마운트. blank 면 admin UI off.
        # 알파벳·숫자·dash·underscore 6..64 자. 예: ADMIN_SLUG=x-vb-2026-panel
        slug = ""
        slug = ${?ADMIN_SLUG}
    }
    iap {
        # App Store Server API (`/inApps/v1/transactions/{transactionId}`) — ES256 JWT 인증.
        # 셋 중 하나라도 blank 면 Apple 영수증 검증 자체 비활성 → `POST /credits/purchase` 의
        # platform=apple 요청을 400 으로 명시 거부 (stub 통과 없음).
        apple {
            # App Store Connect → Users and Access → Keys 페이지 상단 Issuer ID (UUID).
            issuerId = ""
            issuerId = ${?IAP_APPLE_ISSUER_ID}
            # 발급한 In-App Purchase 키의 Key ID (10자).
            keyId = ""
            keyId = ${?IAP_APPLE_KEY_ID}
            # `.p8` 파일 본문. env var 로 줄바꿈 박을 때 `\n` literal 그대로 박으면 됨 —
            # AppConfig 가 실제 newline 으로 복원.
            privateKeyPem = ""
            privateKeyPem = ${?IAP_APPLE_PRIVATE_KEY}
            # iOS 앱 bundle id. 응답 payload 의 bundleId 와 일치 검증.
            bundleId = ""
            bundleId = ${?IAP_APPLE_BUNDLE_ID}
            # "production" (앱스토어 정식) 또는 "sandbox" (TestFlight / sandbox tester).
            environment = "production"
            environment = ${?IAP_APPLE_ENV}
        }
        # Google Android Publisher API (`purchases.products.get`) — service account OAuth2.
        # 둘 다 blank 면 비활성 → platform=google 요청은 400. 출시 안드로이드 빌드 도입 시 채움.
        google {
            packageName = ""
            packageName = ${?IAP_GOOGLE_PACKAGE_NAME}
            # Service account JSON 본문 그대로 (한 줄로 박혀도 OK — JSON 파서가 처리).
            serviceAccountJson = ""
            serviceAccountJson = ${?IAP_GOOGLE_SERVICE_ACCOUNT_JSON}
        }
        # AdMob 보상형 광고 SSV — 비밀값 불필요(Google 공개 검증키로만 서명 검증). 기본 활성.
        # enabled=false 면 /credits/admob-ssv 가 503. 광고 보상 일일 상한은 dailyCap (기본 3).
        admob {
            enabled = "true"
            enabled = ${?ADMOB_SSV_ENABLED}
            dailyCap = "3"
            dailyCap = ${?ADMOB_DAILY_CAP}
        }
    }
}