ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.dubcast.bff.ApplicationKt.module ]
    }
}

dubcast {
    elevenlabs {
        apiKey = ""
        apiKey = ${?ELEVENLABS_API_KEY}
        baseUrl = "https://api.elevenlabs.io"
    }
    storage {
        basePath = "./storage"
        basePath = ${?STORAGE_PATH}
    }
    baseUrl = "http://localhost:8080"
    baseUrl = ${?BFF_BASE_URL}
    perso {
        apiKey = ""
        apiKey = ${?PERSO_API_KEY}
        baseUrl = "https://api.perso.ai"
        baseUrl = ${?PERSO_BASE_URL}
        spaceSeq = "0"
        spaceSeq = ${?PERSO_SPACE_SEQ}
        pollIntervalMs = "15000"
        pollIntervalMs = ${?PERSO_POLL_INTERVAL_MS}
        maxPollMinutes = "30"
        maxPollMinutes = ${?PERSO_MAX_POLL_MINUTES}
    }
    gemini {
        # Vertex AI (Gemini via GCP service account)
        projectId = ""
        projectId = ${?GCP_PROJECT_ID}
        location = "us-central1"
        location = ${?GCP_LOCATION}
        credentialsPath = ""
        credentialsPath = ${?GOOGLE_APPLICATION_CREDENTIALS}
        model = "gemini-2.5-flash"
        model = ${?GEMINI_MODEL}
    }
    separation {
        abandonTtlMs = "1800000"
        abandonTtlMs = ${?SEPARATION_ABANDON_TTL_MS}
        mixTtlMs = "600000"
        mixTtlMs = ${?SEPARATION_MIX_TTL_MS}
        signingSecret = ""
        signingSecret = ${?SEPARATION_SIGNING_SECRET}
        urlTtlSec = "1800"
        urlTtlSec = ${?SEPARATION_URL_TTL_SEC}
        mixUrlTtlSec = "600"
        mixUrlTtlSec = ${?SEPARATION_MIX_URL_TTL_SEC}
    }
}