ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.dubcast.bff.ApplicationKt.module ]
    }
}

dubcast {
    elevenlabs {
        apiKey = ""
        apiKey = ${?ELEVENLABS_API_KEY}
        baseUrl = "https://api.elevenlabs.io"
    }
    storage {
        basePath = "./storage"
        basePath = ${?STORAGE_PATH}
    }
    baseUrl = "http://localhost:8080"
    baseUrl = ${?BFF_BASE_URL}
}
