ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.vibi.bff.ApplicationKt.module ]
    }
}

vibi {
    storage {
        basePath = "./storage"
        basePath = ${?STORAGE_PATH}
        # Cloudflare R2 — 설정 시 큰 산출물 다운로드를 SigV4 presigned URL redirect 로 우회.
        # R2 egress 무료라 Cloud Run egress 비용 0. blank 이면 respondFile fallback (dev 호환).
        r2Bucket = ""
        r2Bucket = ${?R2_BUCKET}
        # account ID (Cloudflare dashboard URL 의 32자 hex) — endpoint host 결정용.
        r2AccountId = ""
        r2AccountId = ${?R2_ACCOUNT_ID}
        # R2 API token. Cloudflare dashboard → R2 → Manage API Tokens. permission: Object Read & Write.
        r2AccessKeyId = ""
        r2AccessKeyId = ${?R2_ACCESS_KEY_ID}
        r2SecretAccessKey = ""
        r2SecretAccessKey = ${?R2_SECRET_ACCESS_KEY}
        # presigned URL TTL — 클라가 받자마자 다운로드 가정해 짧게. 60..86400.
        signedUrlTtlSec = "900"
        signedUrlTtlSec = ${?SIGNED_URL_TTL_SEC}
    }
    baseUrl = "http://localhost:8080"
    baseUrl = ${?BFF_BASE_URL}
    perso {
        apiKey = ""
        apiKey = ${?PERSO_API_KEY}
        baseUrl = "https://api.perso.ai"
        baseUrl = ${?PERSO_BASE_URL}
        # `/perso-storage/...` path 응답 다운로드용 (Azure Blob 기반 public CDN, 인증 X)
        storageBaseUrl = "https://portal-media.perso.ai"
        storageBaseUrl = ${?PERSO_STORAGE_BASE_URL}
        spaceSeq = "0"
        spaceSeq = ${?PERSO_SPACE_SEQ}
        pollIntervalMs = "15000"
        pollIntervalMs = ${?PERSO_POLL_INTERVAL_MS}
        maxPollMinutes = "30"
        maxPollMinutes = ${?PERSO_MAX_POLL_MINUTES}
        # SSRF 방지 화이트리스트 (콤마 분리). baseUrl/storageBaseUrl host 는 자동 포함.
        downloadAllowedHosts = "portal-media.perso.ai"
        downloadAllowedHosts = ${?PERSO_DOWNLOAD_ALLOWED_HOSTS}
    }
    gemini {
        # Vertex AI (Gemini via GCP service account). Cloud Run 호스팅 프로젝트와
        # Vertex AI 가 활성화된 프로젝트가 다를 수 있어 GCP_* 와 이름 분리.
        projectId = ""
        projectId = ${?GEMINI_PROJECT_ID}
        location = "us-central1"
        location = ${?GEMINI_LOCATION}
        credentialsPath = ""
        credentialsPath = ${?GOOGLE_APPLICATION_CREDENTIALS}
        model = "gemini-2.5-flash"
        model = ${?GEMINI_MODEL}
    }
    separation {
        # 모바일 "이어서 작업" 윈도우 — urlTtlSec 는 abandonTtlMs 를 초과하면 안 됨 (디스크/메모리에서 reap 된 잡의
        # 토큰이 살아있어도 서버가 매핑 못함). 둘 다 7일로 맞춤.
        abandonTtlMs = "604800000"
        abandonTtlMs = ${?SEPARATION_ABANDON_TTL_MS}
        mixTtlMs = "600000"
        mixTtlMs = ${?SEPARATION_MIX_TTL_MS}
        signingSecret = ""
        signingSecret = ${?SEPARATION_SIGNING_SECRET}
        urlTtlSec = "604800"
        urlTtlSec = ${?SEPARATION_URL_TTL_SEC}
        mixUrlTtlSec = "600"
        mixUrlTtlSec = ${?SEPARATION_MIX_URL_TTL_SEC}
    }
    auth {
        # Comma-separated Google OAuth client IDs (iOS / Android / Web). tokeninfo
        # 응답의 aud 가 이 중 하나와 일치해야 통과.
        googleClientIds = ""
        googleClientIds = ${?GOOGLE_OAUTH_CLIENT_IDS}
        # Comma-separated Apple Sign In client IDs (iOS bundle id 등). JWKS 검증된
        # ID Token 의 aud 가 이 중 하나와 일치해야 통과. blank 면 Apple 로그인 비활성.
        appleClientIds = ""
        appleClientIds = ${?APPLE_OAUTH_CLIENT_IDS}
        # HMAC-SHA256 서명 키, 32+ chars. openssl rand -hex 32
        jwtSecret = ""
        jwtSecret = ${?AUTH_JWT_SECRET}
        # access token 만료(초). 기본 7일.
        jwtExpirySeconds = "604800"
        jwtExpirySeconds = ${?AUTH_JWT_EXPIRY_SECONDS}
    }
    db {
        # Postgres JDBC URL. Neon free tier 권장 (jdbc:postgresql://...neon.tech/neondb?sslmode=require).
        # Cloud Run / Cloudflare Containers 어디서든 동일하게 사용.
        jdbcUrl = ""
        jdbcUrl = ${?DATABASE_URL}
        user = ""
        user = ${?DB_USER}
        password = ""
        password = ${?DB_PASSWORD}
        # HikariCP pool size. Neon free tier 100 connection 한도, 인스턴스당 5 충분.
        maxPoolSize = "5"
        maxPoolSize = ${?DB_MAX_POOL}
    }
    admin {
        # 운영자 admin SPA 의 추측 불가 경로 — `/${slug}/` 로 마운트. blank 면 admin UI off.
        # 알파벳·숫자·dash·underscore 6..64 자. 예: ADMIN_SLUG=x-vb-2026-panel
        slug = ""
        slug = ${?ADMIN_SLUG}
    }
}