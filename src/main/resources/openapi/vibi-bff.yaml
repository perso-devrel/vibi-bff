openapi: 3.0.3
info:
  title: vibi BFF API
  description: |
    vibi Backend-For-Frontend API.

    - Perso AI 프록시 — 음성분리
    - 로컬 ffmpeg 파이프라인 — segment concat + BGM mix + 음원분리 stem amix
    - Google / Apple Sign In 검증 + Postgres user upsert + HS256 access token 발급

    모든 운영 endpoint 는 `/api/v2` 아래에 마운트된다. 1MB 이상 binary 응답
    (음원 stem / 렌더 산출물) 은 BFF 자체 HMAC 토큰 (`token` query param) 으로
    보호되며, signed URL 은 `*StatusResponse` 가 `READY` / `COMPLETED` 상태에
    도달했을 때만 동봉된다.
  version: 0.5.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
    description: |
      Google / Apple ID Token 검증 → users 테이블 upsert (provider+providerSub 유니크) →
      BFF access token (HS256 JWT) 발급. JWT `sub` 는 user 의 internal UUID
      (provider sub 가 아님) — 향후 IAP `appAccountToken` 으로도 재사용.
      DELETE /account 는 App Store 가이드라인 5.1.1(v) 의 in-app account deletion 충족.
  - name: Credits
    description: |
      크레딧 잔액 + IAP 영수증 가산. App Store / Play Store productId 와 1:1 매핑된
      카탈로그(CreditCatalog) 만 허용. (platform, transactionId) UNIQUE 로 재시도 중복 차단.
  - name: Render
    description: ffmpeg 기반 렌더 파이프라인 (segments / bgm / 음원분리 directive)
  - name: Separation
    description: Perso 음성분리 → stem 다운로드 (사용자 mix 는 모바일 로컬에서)
  - name: Testdata
    description: 개발/QA 용 mock 음원분리 데이터 — production 비활성 권장

paths:
  # ---------------------------------------------------------------- Auth
  /api/v2/auth/google:
    post:
      tags: [Auth]
      summary: Google ID Token → BFF access token 교환
      description: |
        모바일이 native Google SDK 로 받은 ID Token 을 Google `tokeninfo` 로 검증한 뒤,
        `users` 테이블에 (provider=google, providerSub=Google sub) 로 upsert 하고 HS256
        access token (JWT) 발급. JWT 의 `sub` 는 BFF internal UUID — Google sub 가 아님.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GoogleAuthRequest' }
      responses:
        '200':
          description: 발급 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          description: ID Token 검증 실패
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v2/auth/apple:
    post:
      tags: [Auth]
      summary: Apple ID Token → BFF access token 교환
      description: |
        iOS 클라이언트가 AuthenticationServices 로 받은 Apple ID Token 을 Apple JWKS
        (RS256) 로 검증한 뒤, `users` 테이블에 (provider=apple, providerSub=Apple sub) 로
        upsert 하고 HS256 access token (JWT) 발급. JWT 의 `sub` 는 BFF internal UUID.

        `fullName` 은 Apple 이 **최초 동의 시 1회만** 제공 — 신규 가입에만 user.name 으로
        사용되고, 이후 로그인엔 null 로 와도 DB 의 기존 name 보존.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppleAuthRequest' }
      responses:
        '200':
          description: 발급 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          description: ID Token 검증 실패 (서명/만료/aud 불일치)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v2/auth/account:
    delete:
      tags: [Auth]
      summary: 회원탈퇴 (인증된 본인 영구 삭제)
      description: |
        Authorization 헤더의 JWT sub 에 해당하는 user row 를 삭제한다. FK 정책:
          • user_credits / credit_transactions — `ON DELETE CASCADE` 로 함께 삭제 (영수증 row 제외)
          • render_jobs / separation_jobs — `ON DELETE SET NULL` 로 익명 row 보존 (KPI 연속성)
        Apple 의 경우 클라이언트도 Sign In with Apple 토큰 revoke 를 호출하는 것이 권장된다 (TODO 표시).
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 삭제 완료
        '401':
          description: 인증 실패
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ---------------------------------------------------------------- Credits
  /api/v2/credits:
    get:
      tags: [Credits]
      summary: 현재 사용자 크레딧 잔액
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 잔액
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreditBalanceResponse' }
        '401':
          description: 인증 실패
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v2/credits/cost:
    get:
      tags: [Credits]
      summary: 음원 분리 비용 견적
      description: |
        모바일이 "이 구간 음원분리 X 크레딧 사용, 진행?" 팝업 표시 전에 호출.
        비용 공식: ceil(durationMs / 60000) 크레딧, **최소 1**. /separate 의 실제 차감과
        동일 source. `sufficient=false` 면 모바일은 충전 UI 분기.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: durationMs
          required: true
          schema:
            type: integer
            format: int64
            minimum: 0
          description: 비용 산정 기준 입력 길이 (ms). trim 윈도우 또는 원본 영상 길이.
      responses:
        '200':
          description: 비용 + 잔액 + sufficiency
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreditCostResponse' }
        '400':
          description: durationMs 누락/음수 — `missing_duration_ms` / `duration_ms_negative`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: 인증 실패
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v2/credits/purchase:
    post:
      tags: [Credits]
      summary: IAP 영수증 가산 (idempotent)
      description: |
        StoreKit2 / Play Billing 영수증을 Apple App Store Server API
        (`/inApps/v1/transactions/{transactionId}`) / Google Play Developer API
        (`purchases.products.get`) 로 직접 검증한 뒤 잔액에 가산. 같은
        `(platform, transactionId)` 조합으로 재호출되면 `granted=0` 이 반환된다.
        productId 는 [CreditCatalog](`src/main/kotlin/com/vibi/bff/model/CreditModels.kt`) 의 키여야 한다.

        실패 외부 메시지는 모두 `receipt_invalid` 로 단일화 (sanitize) — 환불 / productId
        mismatch / FAMILY_SHARED ownership / revoked transaction 등 내부 분류는 로그에만.
        Apple/Google 5xx 일시 장애는 별도 502 `receipt_verify_unavailable` 로 분리.

        verifier 가 환경변수 미설정으로 비활성 (`apple` 또는 `google`) 인 경우 해당 platform
        요청은 400 `iap_unconfigured` — stub 통과 없이 명시 거부.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreditPurchaseRequest' }
      responses:
        '200':
          description: 처리 결과
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreditPurchaseResponse' }
        '400':
          description: 영수증/productId 검증 실패 — `receipt_invalid` / `iap_unconfigured` / `unknown_product` / `invalid_platform` / `missing_receipt`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: 인증 실패
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '502':
          description: Apple/Google 일시 장애 — `receipt_verify_unavailable`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v2/credits/admin-grant:
    post:
      tags: [Credits]
      summary: 관리자 무료 충전 (admin role 전용)
      description: |
        영수증 검증 없이 인증된 admin 사용자에게 [CreditCatalog] productId 의 크레딧 가산.
        `(platform="admin", transactionId=admin-<UUID>)` 로 매 호출마다 새 grant 가 일어남
        — 운영자가 같은 상품을 반복 탭하면 매번 가산되는 동작이 의도.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminGrantRequest' }
      responses:
        '200':
          description: 가산 결과
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreditPurchaseResponse' }
        '400':
          description: 알 수 없는 productId
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: 인증 실패
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: admin role 아님
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ---------------------------------------------------------------- Render
  /api/v2/render/inputs:
    post:
      tags: [Render]
      summary: 공유 입력 캐시 등록 (1회 업로드 → N variant 재사용)
      description: |
        같은 source video 로 여러 variant 렌더를 돌릴 때, 영상/segment 오디오를 한 번만
        업로드하고 응답의 `inputId` 를 `/api/v2/render` 의 `inputId` form 필드로 넘겨
        재사용한다. `inputId` 는 video 바이트의 sha256 prefix 이므로 동일 파일 재업로드 시
        동일 슬롯에 매핑되고 `lastAccessAt` 만 갱신된다. TTL 은 `RENDER_INPUT_CACHE_TTL_HOURS`
        (기본 24h) 이후 만료.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [video]
              properties:
                video:
                  type: string
                  format: binary
                  description: 원본 영상 (필수)
      responses:
        '200':
          description: 캐시 등록 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RenderInputCacheResponse' }
        '400':
          description: video part 누락 / 중복
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v2/render:
    post:
      tags: [Render]
      summary: 렌더 잡 제출 (ffmpeg)
      description: |
        multipart 파트 명명 규칙:

        - `video` — legacy 단일 영상 (segments 미사용)
        - `video_<key>` — segments[].sourceFileKey 가 가리키는 영상
        - `segment_image_<key>` — segments[].sourceFileKey 가 가리키는 정지 이미지 (segment type=IMAGE)
        - `bgm_<key>` — bgmClips[].audioFileKey 가 가리키는 BGM
        - `config` — RenderConfig JSON 문자열
        - `inputId` — `/render/inputs` 응답의 inputId. video 파트는 캐시 우선.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  type: string
                  description: RenderConfig JSON (RenderConfig schema 참조)
                inputId:
                  type: string
                  description: 선택. `/render/inputs` 응답의 inputId.
                video:
                  type: string
                  format: binary
      responses:
        '200':
          description: 잡 접수
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RenderResponse' }
        '400':
          description: |
            - config 미지정
            - bgm clip 의 fileKey 가 가리키는 multipart 파트 누락
            - inputId 만료 / not found
            - separationDirectives 의 stem audioUrl 이 BFF 자체 HMAC URL 패턴 아님
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v2/render/{jobId}/status:
    get:
      tags: [Render]
      summary: 렌더 잡 상태
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 상태
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RenderStatusResponse' }
        '404':
          description: 잡 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v2/render/{jobId}/download:
    get:
      tags: [Render]
      summary: 렌더 산출물 다운로드
      description: |
        status=COMPLETED 일 때만 200. outputFile 확장자에 따라 mp4 / m4a / mp3 / wav
        Content-Type 으로 응답. attachment 다운로드 헤더 동봉.
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 렌더 파일
          content:
            video/mp4:
              schema: { type: string, format: binary }
            audio/mp4:
              schema: { type: string, format: binary }
            audio/mpeg:
              schema: { type: string, format: binary }
            audio/wav:
              schema: { type: string, format: binary }
        '404':
          description: 잡 없음 / 미완료 / 파일 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ---------------------------------------------------------------- Separation
  /api/v2/separate:
    post:
      tags: [Separation]
      summary: 음성분리 잡 제출
      description: |
        모바일이 trim + audio extract 까지 끝낸 audio (m4a / mp3 / wav) 만 받는다.
        BFF 는 받은 file 을 그대로 Perso 에 forward — ffmpeg 가공 단계 없음.
        Perso 비호환 포맷 (video/*, flac, ogg 등) 은 400 `unsupported_audio_format` 으로 reject.
        최대 100MB.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, spec]
              properties:
                file:
                  type: string
                  format: binary
                  description: audio bytes (m4a/mp3/wav). 최대 100MB.
                spec:
                  type: string
                  description: SeparationSpec JSON
      responses:
        '202':
          description: 잡 접수
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SeparationResponse' }
        '400':
          description: |
            spec 누락 / file 누락 / `unsupported_audio_format` (video, flac 등) /
            multipart 100MB 초과
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '402':
          description: |
            잔액 부족 — `insufficient_credits`. detail 에 `required=<N> balance=<M>` 형식으로 부족분 노출.
            모바일은 충전 화면으로 분기. 비용 예측은 `/api/v2/credits/cost` 사전 호출.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v2/separate/{jobId}:
    get:
      tags: [Separation]
      summary: 음성분리 잡 상태 + stem signed URL
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: status=READY 일 때 stems 에 signed URL 동봉
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SeparationStatusResponse' }
        '404':
          description: 잡 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v2/separate/{jobId}/stem/{stemId}:
    get:
      tags: [Separation]
      summary: 음성분리 stem 다운로드 (HMAC 토큰 필수)
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
        - in: path
          name: stemId
          required: true
          schema: { type: string }
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: stem 오디오
          content:
            audio/wav:
              schema: { type: string, format: binary }
        '403':
          description: 토큰 검증 실패
        '404':
          description: 잡/stem/파일 없음

  # ---------------------------------------------------------------- Testdata (mock)
  /api/v2/testdata/separation/list:
    get:
      tags: [Testdata]
      summary: 개발용 mock 음성분리 폴더 목록
      description: |
        `testdata/<startSec>-<endSec>/` 디렉터리 구조를 스캔해 폴더별 stem 이름 (확장자 제외)
        목록 반환. production 배포에는 testdata 디렉터리가 없어 404.
      responses:
        '200':
          description: 폴더 목록
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TestdataSeparationFolder' }
        '404':
          description: testdata 디렉터리 없음

  /api/v2/testdata/separation/{folder}/{stem}:
    get:
      tags: [Testdata]
      summary: 개발용 mock stem 오디오
      parameters:
        - in: path
          name: folder
          required: true
          description: '`<startSec>-<endSec>` 패턴 (예: `0-30`)'
          schema: { type: string }
        - in: path
          name: stem
          required: true
          description: 확장자 제외 stem 파일 basename
          schema: { type: string }
      responses:
        '200':
          description: stem 오디오 (wav/mp3/m4a/aac/ogg/flac 중 첫 매치)
          content:
            audio/wav:
              schema: { type: string, format: binary }
            audio/mpeg:
              schema: { type: string, format: binary }
            audio/aac:
              schema: { type: string, format: binary }
            audio/ogg:
              schema: { type: string, format: binary }
            audio/flac:
              schema: { type: string, format: binary }
        '404':
          description: 폴더/stem 파일 없음 / folder 패턴 invalid

components:
  schemas:
    # -------------------------- Common
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: 에러 메시지 또는 에러 코드 (클라이언트가 switch 해야 하는 경우 코드성)
        detail:
          type: string
          nullable: true

    # -------------------------- Auth
    GoogleAuthRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
          description: 모바일 native Google SDK 가 반환한 ID Token

    AppleAuthRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
          description: iOS AuthenticationServices 가 반환한 Apple ID Token
        fullName:
          type: string
          nullable: true
          description: |
            Apple 이 최초 동의 시 1회만 제공. 신규 가입에만 user.name 으로 채워지고,
            재로그인엔 null 이어도 DB 의 기존 name 유지.

    AuthUser:
      type: object
      required: [sub, email, name]
      properties:
        sub:
          type: string
          description: BFF internal UUID (provider sub 가 아님). IAP appAccountToken 으로도 재사용.
        email: { type: string }
        name: { type: string }
        picture:
          type: string
          nullable: true

    AuthResponse:
      type: object
      required: [accessToken, expiresAt, user]
      properties:
        accessToken:
          type: string
          description: HS256 JWT (sub=AuthUser.sub)
        expiresAt:
          type: integer
          format: int64
          description: epoch millis
        user: { $ref: '#/components/schemas/AuthUser' }

    # -------------------------- Credits
    CreditBalanceResponse:
      type: object
      required: [balance]
      properties:
        balance:
          type: integer
          minimum: 0
          description: 현재 잔액 (row 가 없으면 0)

    CreditCostResponse:
      type: object
      required: [durationMs, credits, balance, sufficient]
      properties:
        durationMs:
          type: integer
          format: int64
          minimum: 0
          description: 견적 기준 입력 길이 (요청 echo back)
        credits:
          type: integer
          minimum: 1
          description: 차감될 크레딧 수 (영상 1개당 고정 1)
        balance:
          type: integer
          minimum: 0
          description: 호출 시점 잔액
        sufficient:
          type: boolean
          description: balance >= credits 여부

    CreditPurchaseRequest:
      type: object
      required: [productId, platform, receipt, transactionId]
      properties:
        productId:
          type: string
          description: App Store Connect / Play Console 의 SKU. CreditCatalog 에 등록된 값만 허용.
          example: vibi.credits.50
        platform:
          type: string
          enum: [apple, google]
        receipt:
          type: string
          description: StoreKit2 Transaction.jsonRepresentation 또는 Play Billing purchaseToken
        transactionId:
          type: string
          description: idempotency key — App Store / Play Store 의 unique transaction ID

    CreditPurchaseResponse:
      type: object
      required: [granted, balance, transactionId]
      properties:
        granted:
          type: integer
          minimum: 0
          description: 이번 호출로 가산된 크레딧. duplicate transactionId 면 0.
        balance:
          type: integer
          minimum: 0
        transactionId:
          type: string

    AdminGrantRequest:
      type: object
      required: [productId]
      properties:
        productId:
          type: string
          description: CreditCatalog 에 등록된 productId. 매 호출마다 서버가 새 txId 생성.
          example: vibi.credits.150

    # -------------------------- Render
    BgmClip:
      type: object
      required: [audioFileKey, startMs]
      properties:
        audioFileKey: { type: string, description: 'multipart `bgm_<key>` 파트 매칭' }
        startMs: { type: integer, format: int64 }
        volume: { type: number, format: float, default: 1.0 }

    Segment:
      type: object
      required: [sourceFileKey, order, durationMs]
      properties:
        sourceFileKey:
          type: string
          description: 'multipart `video_<key>` 파트 매칭'
        order: { type: integer }
        durationMs: { type: integer, format: int64 }
        trimStartMs: { type: integer, format: int64, nullable: true }
        trimEndMs: { type: integer, format: int64, nullable: true }
        volumeScale: { type: number, format: float, default: 1.0 }
        speedScale: { type: number, format: float, default: 1.0 }

    SeparationStemSelectionDto:
      type: object
      required: [stemId, audioUrl]
      properties:
        stemId: { type: string }
        audioUrl:
          type: string
          description: |
            BFF 자체 HMAC URL 만 허용 — `/api/v2/separate/{jobId}/stem/{stemId}?token=...` 패턴.
            외부 URL 은 SSRF 위험으로 reject.
        volume: { type: number, format: float, default: 1.0 }

    SeparationDirectiveDto:
      type: object
      required: [id, rangeStartMs, rangeEndMs, muteOriginalSegmentAudio]
      properties:
        id: { type: string }
        rangeStartMs: { type: integer, format: int64 }
        rangeEndMs: { type: integer, format: int64 }
        muteOriginalSegmentAudio: { type: boolean }
        selections:
          type: array
          items: { $ref: '#/components/schemas/SeparationStemSelectionDto' }
        sourceOffsetMs:
          type: integer
          format: int64
          default: 0
          description: |
            Stem audio 파일 안에서 본 directive piece 가 시작하는 offset (ms).
            기본 0 = 신규 분리 결과. 모바일이 영상 range delete 로 directive 를 split 하면,
            뒤쪽 piece 의 sourceOffsetMs 가 누적된다.

    RenderConfig:
      type: object
      properties:
        videoDurationMs:
          type: integer
          format: int64
          nullable: true
          description: legacy (segments 미사용 시)
        segments:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/Segment' }
        bgmClips:
          type: array
          items: { $ref: '#/components/schemas/BgmClip' }
        separationDirectives:
          type: array
          items: { $ref: '#/components/schemas/SeparationDirectiveDto' }
        outputKind:
          type: string
          enum: [video, audio]
          default: video
          description: |
            audio 모드는 segment audio 트랙들을 trim/concat + bgmClips mix → 단일 .m4a.
            separation stems 는 audio 모드에서 무시.
        quality:
          type: string
          enum: [high, medium, low]
          default: medium
          description: |
            출력 audio 비트레이트 프로필. video 는 최종 패스에서 stream-copy 되므로
            quality 와 무관 (per-segment trim 의 libx264 도 별개 고정 설정).
              high   — audio 192k.
              medium — audio 192k (기본).
              low    — audio 128k.
            audio 모드에선 quality 무시 — 후속 분리 파이프라인 입력 품질 보장 위해 별도 유지.

    RenderResponse:
      type: object
      required: [jobId]
      properties:
        jobId: { type: string }

    RenderStatusResponse:
      type: object
      required: [jobId, status]
      properties:
        jobId: { type: string }
        status:
          type: string
          enum: [QUEUED, PROCESSING, COMPLETED, FAILED]
        progress: { type: integer, nullable: true }
        error: { type: string, nullable: true }
        progressReason:
          type: string
          nullable: true
          description: '"queued" (ffmpeg permit 대기 중) 또는 null'

    RenderInputCacheResponse:
      type: object
      required: [inputId, expiresAt, videoSizeBytes]
      properties:
        inputId:
          type: string
          description: sha256(video bytes) prefix (hex)
        expiresAt:
          type: integer
          format: int64
          description: epoch millis (lastAccessAt + TTL)
        videoSizeBytes:
          type: integer
          format: int64

    # -------------------------- Separation
    SeparationSpec:
      type: object
      description: |
        BFF 가 받는 audio 의 메타. 모바일이 trim + audio extract 까지 끝내고 보내므로
        trim window / mediaType / editedRenderJobId 등 옛 필드는 surface 에서 제거.
      properties:
        sourceLanguageCode:
          type: string
          default: auto

    SeparationResponse:
      type: object
      required: [jobId]
      properties:
        jobId: { type: string }

    StemInfo:
      type: object
      required: [stemId, label, url]
      properties:
        stemId: { type: string }
        label: { type: string }
        url:
          type: string
          description: signed (HMAC token) BFF URL
        durationMs:
          type: integer
          format: int64
          nullable: true

    SeparationStatusResponse:
      type: object
      required: [jobId, status]
      properties:
        jobId: { type: string }
        status:
          type: string
          enum: [QUEUED, SUBMITTING, UPLOADING_UPSTREAM, SUBMITTED, PROCESSING, DOWNLOADING, READY, FAILED, DISPOSED]
          description: |
            QUEUED = BFF 큐 대기 (Perso 미호출).
            SUBMITTING = dispatcher 가 Perso 호출 중 (수초).
            UPLOADING_UPSTREAM/SUBMITTED/PROCESSING/DOWNLOADING = pipeline 세부 단계.
            READY/FAILED = 종결.
        progress: { type: integer, nullable: true }
        progressReason: { type: string, nullable: true }
        error: { type: string, nullable: true }
        stems:
          type: array
          items: { $ref: '#/components/schemas/StemInfo' }
        actualDurationMs:
          type: integer
          format: int64
          nullable: true
          description: |
            READY 상태에서 stem FLAC 의 실측 길이(ms). 클라이언트가 사용자 선택 trim 길이
            대신 이 값을 timeline 막대 길이로 사용 — stem 파일과 1:1 매칭. null = 측정 실패
            또는 미-READY.
        queuePosition:
          type: integer
          nullable: true
          description: |
            QUEUED 상태일 때만 set. 1-based — `1` 은 다음 차례. 모바일 "대기 N번째" 표시용.
            QUEUED 가 아니면 null.
        estimatedWaitSec:
          type: integer
          format: int64
          nullable: true
          description: |
            queuePosition × 최근 평균 처리 시간(초) 추정 대기. 표본 부족 시 보수적 fallback.
            QUEUED 가 아니거나 추정 불가면 null.

    # -------------------------- Testdata
    TestdataSeparationFolder:
      type: object
      required: [folder, startSec, endSec, stems]
      properties:
        folder:
          type: string
          description: '`<startSec>-<endSec>` 패턴'
        startSec: { type: integer }
        endSec: { type: integer }
        stems:
          type: array
          items:
            type: string
            description: 확장자 제외 basename
