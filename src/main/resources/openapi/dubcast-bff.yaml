openapi: 3.0.3
info:
  title: DubCast BFF API
  description: |
    DubCast Backend-For-Frontend API.
    ElevenLabs API를 프록시하여 보이스 목록 조회, TTS 음성 생성, 립싱크 처리를 제공합니다.
  version: 0.2.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Voices
    description: ElevenLabs 보이스 목록
  - name: TTS
    description: Text-to-Speech 음성 생성
  - name: Subtitles
    description: 자동 자막 (Perso STT + Gemini 번역)
  - name: AutoDub
    description: 자동 더빙 (Perso translate)

paths:
  /api/v2/subtitles:
    post:
      tags: [Subtitles]
      summary: 자동 자막 생성 잡 제출
      description: |
        업로드된 영상/오디오를 Perso 에 보내 원본 SRT 를 추출한다. spec.targetLanguageCode 가
        sourceLanguageCode 와 다르면 Gemini 번역 SRT 도 생성한다.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, spec]
              properties:
                file:
                  type: string
                  format: binary
                spec:
                  type: string
                  description: SubtitleSpec JSON
      responses:
        '202':
          description: 잡 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubtitleJobResponse'

  /api/v2/subtitles/{jobId}:
    get:
      tags: [Subtitles]
      summary: 자막 잡 상태
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubtitleStatusResponse'

  /api/v2/subtitles/{jobId}/srt:
    get:
      tags: [Subtitles]
      summary: SRT 스트림 (HMAC 토큰 필수)
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
        - in: query
          name: lang
          required: true
          schema:
            type: string
            enum: [original, translated]
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: SRT 본문
          content:
            application/x-subrip:
              schema: { type: string }
        '403':
          description: 토큰 검증 실패
        '404':
          description: 잡/SRT 없음

  /api/v2/autodub:
    post:
      tags: [AutoDub]
      summary: 자동 더빙 잡 제출
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, spec]
              properties:
                file:
                  type: string
                  format: binary
                spec:
                  type: string
                  description: AutoDubSpec JSON
      responses:
        '202':
          description: 잡 접수
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoDubJobResponse'

  /api/v2/autodub/{jobId}:
    get:
      tags: [AutoDub]
      summary: 더빙 잡 상태
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoDubStatusResponse'

  /api/v2/autodub/{jobId}/audio:
    get:
      tags: [AutoDub]
      summary: 더빙 오디오 스트림 (HMAC 토큰 필수)
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: mp3 스트림
          content:
            audio/mpeg:
              schema: { type: string, format: binary }
        '403':
          description: 토큰 검증 실패
        '404':
          description: 잡 없음

components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: 에러 메시지
        detail:
          type: string
          nullable: true
          description: 상세 에러 정보

    Voice:
      type: object
      required: [voiceId, name]
      properties:
        voiceId:
          type: string
          description: ElevenLabs 보이스 ID
        name:
          type: string
          description: 보이스 이름
        previewUrl:
          type: string
          nullable: true
          description: 미리듣기 URL
        category:
          type: string
          nullable: true
          description: "카테고리 (premade, cloned 등)"
        labels:
          type: object
          additionalProperties:
            type: string
          description: 보이스 라벨 (accent, gender 등)

    VoiceListResponse:
      type: object
      required: [voices]
      properties:
        voices:
          type: array
          items:
            $ref: '#/components/schemas/Voice'

    TtsRequest:
      type: object
      required: [text, voiceId]
      properties:
        text:
          type: string
          description: 변환할 텍스트
        voiceId:
          type: string
          description: 사용할 보이스 ID
        languageCode:
          type: string
          nullable: true
          description: "언어 코드 (ko, en, ja 등)"
        modelId:
          type: string
          default: "eleven_multilingual_v2"
          description: ElevenLabs 모델 ID
        stability:
          type: number
          format: float
          default: 0.5
          description: "음성 안정성 (0.0 ~ 1.0)"
        similarityBoost:
          type: number
          format: float
          default: 0.75
          description: "유사도 부스트 (0.0 ~ 1.0)"

    TtsResponse:
      type: object
      required: [audioUrl]
      properties:
        audioUrl:
          type: string
          description: 생성된 오디오 파일 다운로드 URL

    SubtitleSpec:
      type: object
      required: [mediaType, sourceLanguageCode]
      properties:
        mediaType:
          type: string
          enum: [VIDEO, AUDIO]
        sourceLanguageCode:
          type: string
        targetLanguageCode:
          type: string
          nullable: true
          description: null 또는 source 와 동일하면 번역 생략
        numberOfSpeakers:
          type: integer
          default: 1
          minimum: 1
          maximum: 10

    SubtitleJobResponse:
      type: object
      required: [jobId]
      properties:
        jobId: { type: string }

    SubtitleStatusResponse:
      type: object
      required: [jobId, status]
      properties:
        jobId: { type: string }
        status:
          type: string
          enum: [PENDING, UPLOADING_UPSTREAM, SUBMITTED, PROCESSING, DOWNLOADING, READY, FAILED]
        progress: { type: integer, nullable: true }
        progressReason: { type: string, nullable: true }
        error: { type: string, nullable: true }
        originalSrtUrl: { type: string, nullable: true }
        translatedSrtUrl: { type: string, nullable: true }

    AutoDubSpec:
      type: object
      required: [mediaType, sourceLanguageCode, targetLanguageCode]
      properties:
        mediaType:
          type: string
          enum: [VIDEO, AUDIO]
        sourceLanguageCode: { type: string }
        targetLanguageCode: { type: string }
        numberOfSpeakers:
          type: integer
          default: 1
          minimum: 1
          maximum: 10
        ttsModel:
          type: string
          nullable: true

    AutoDubJobResponse:
      type: object
      required: [jobId]
      properties:
        jobId: { type: string }

    AutoDubStatusResponse:
      type: object
      required: [jobId, status]
      properties:
        jobId: { type: string }
        status:
          type: string
          enum: [PENDING, UPLOADING_UPSTREAM, SUBMITTED, PROCESSING, DOWNLOADING, READY, FAILED]
        progress: { type: integer, nullable: true }
        progressReason: { type: string, nullable: true }
        error: { type: string, nullable: true }
        dubbedAudioUrl: { type: string, nullable: true }

